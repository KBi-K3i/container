# 起動コマンド：
# docker-compose build --no-cache && docker-compose up -d && docker-compose ls

services:
  python_dev_container:
    container_name: python_dev_container # 起動のたびに名前が変わらないように固定する
    build: . # Dockerfileの場所
    volumes:
      - ~/src/container/python_dev_container:/bindmount:z # ホスト側のディレクトリ : コンテナのディレクトリ : SELinux用のラベル(z)
    working_dir: /bindmount # 起動時のカレントディレクトリ
    ports:
      - "8000:8000"
    init: true
    tty: true