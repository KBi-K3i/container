# 起動コマンド：
# docker-compose build --no-cache && docker-compose up -d && docker-compose ls

services:
  python_dev_container:
    container_name: python_dev_container # 起動のたびに名前が変わらないように固定する
    build: . # Dockerfileの場所

    # docker-compose.yaml と同じ階層に workspace ディレクトリを作成してください。
    volumes:
      - ~/src/container/python_dev_container/workspace:/workspace:z # ホスト側のディレクトリ : コンテナのディレクトリ : SELinux用のラベル(z)

    working_dir: /workspace # 起動時のカレントディレクトリ
    
    ports:
      - "8000:8000"
    
    init: true
    tty: true